name: Libft Tester

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      libft_repository:
        description: "Repository to test, for example owner/libft"
        required: false
        type: string

env:
  TARGET_LIBFT_REPOSITORY: ${{ inputs.libft_repository || vars.LIBFT_REPOSITORY }}

jobs:
  tester-self-test:
    name: Tester self-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tester
        uses: actions/checkout@v7

      - name: Run diagnose/rescue fixtures
        run: make self-test

  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    if: ${{ vars.LIBFT_REPOSITORY != '' || (github.event_name == 'workflow_dispatch' && inputs.libft_repository != '') }}

    steps:
      - name: Checkout libft under test
        uses: actions/checkout@v7
        with:
          repository: ${{ env.TARGET_LIBFT_REPOSITORY }}
          path: libft

      - name: Checkout tester
        uses: actions/checkout@v7
        with:
          path: libft/tester

      - name: Build tester
        working-directory: libft/tester
        run: make build

      - name: Run full suite as JSON
        working-directory: libft/tester
        run: |
          set +e
          ./libft_tester --json --no-color > libft-test-report.json
          status=$?
          cat libft-test-report.json
          exit $status

      - name: Generate HTML report
        if: always()
        working-directory: libft/tester
        run: |
          set +e
          ./libft_tester --html --no-color > libft-test-report.html
          exit 0

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: libft-test-report
          path: libft/tester/libft-test-report.json
          if-no-files-found: ignore

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: libft-html-report
          path: libft/tester/libft-test-report.html
          if-no-files-found: ignore

  leaks:
    name: Valgrind leaks
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ vars.LIBFT_REPOSITORY != '' || (github.event_name == 'workflow_dispatch' && inputs.libft_repository != '') }}

    steps:
      - name: Checkout libft under test
        uses: actions/checkout@v7
        with:
          repository: ${{ env.TARGET_LIBFT_REPOSITORY }}
          path: libft

      - name: Checkout tester
        uses: actions/checkout@v7
        with:
          path: libft/tester

      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind

      - name: Build tester and internal suite
        working-directory: libft/tester
        run: make suite

      - name: Run focused leak check
        working-directory: libft/tester
        run: |
          set +e
          LIBFT_TESTER_NO_FORK=1 valgrind --leak-check=full \
            --show-leak-kinds=all --track-origins=yes \
            --errors-for-leak-kinds=all --error-exitcode=42 \
            tester/build/libft_suite --only ft_split --no-color > valgrind-report.txt 2>&1
          status=$?
          cat valgrind-report.txt
          exit $status

      - name: Upload Valgrind report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: valgrind-report
          path: libft/tester/valgrind-report.txt
          if-no-files-found: ignore

  coverage:
    name: Coverage metadata
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ vars.LIBFT_REPOSITORY != '' || (github.event_name == 'workflow_dispatch' && inputs.libft_repository != '') }}

    steps:
      - name: Checkout libft under test
        uses: actions/checkout@v7
        with:
          repository: ${{ env.TARGET_LIBFT_REPOSITORY }}
          path: libft

      - name: Checkout tester
        uses: actions/checkout@v7
        with:
          path: libft/tester

      - name: Build tester
        working-directory: libft/tester
        run: make build

      - name: Generate coverage metadata
        working-directory: libft/tester
        run: ./libft_tester --coverage > coverage-report.txt

      - name: Show coverage metadata
        working-directory: libft/tester
        run: cat coverage-report.txt

      - name: Upload coverage metadata
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: libft/tester/coverage-report.txt

  configuration-help:
    name: Configuration help
    runs-on: ubuntu-latest
    if: ${{ vars.LIBFT_REPOSITORY == '' && (github.event_name != 'workflow_dispatch' || inputs.libft_repository == '') }}

    steps:
      - name: Explain missing variable
        run: |
          echo "Set the repository variable LIBFT_REPOSITORY to run this workflow automatically."
          echo "Example: NeddyKun01/Libft"
          echo "You can also run workflow_dispatch and provide libft_repository manually."
